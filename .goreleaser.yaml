# GoReleaser configuration — https://goreleaser.com
# Build with: goreleaser release --snapshot --clean   (local dry run)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: swaggervu
    main: .
    binary: swaggervu
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/codejavu-llc/swaggervu/cmd.version={{.Version}}

archives:
  - id: swaggervu
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-dev'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: false
  prerelease: auto
